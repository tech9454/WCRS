<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-en="Settings" data-ru="Настройки">Settings</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-section: #ffffff;
      --text: #333333;
      --border: #e0e0e0;
      --accent: #667eea;
      --input-bg: #ffffff;
      --input-border: #cccccc;
    }
    body.dark {
      --bg: #1a1a2e;
      --bg-section: #16213e;
      --text: #e0e0e0;
      --border: #2a2a4a;
      --accent: #7c8cf5;
      --input-bg: #0f3460;
      --input-border: #2a2a4a;
    }
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    h1 { color: var(--accent); }
    .section {
      margin-bottom: 25px;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-section);
    }
    .section h2 { margin-top: 0; color: var(--accent); font-size: 18px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    textarea {
      width: 100%; min-height: 150px; padding: 8px;
      border: 1px solid var(--input-border); border-radius: 4px;
      font-family: monospace; background: var(--input-bg); color: var(--text);
      box-sizing: border-box;
    }
    select {
      padding: 8px; border: 1px solid var(--input-border); border-radius: 4px;
      background: var(--input-bg); color: var(--text);
    }
    .checkbox-group { margin-bottom: 10px; }
    .checkbox-group label { display: inline; margin-left: 8px; font-weight: normal; }
    button {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #5568d3; }
    
    .help-icon {
      display: inline-block;
      margin-left: 8px;
      cursor: help;
      color: var(--accent);
      font-weight: bold;
      font-size: 13px;
      width: 22px;
      height: 22px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      text-align: center;
      line-height: 18px;
      position: relative;
      vertical-align: middle;
    }
    .help-icon::before { content: '?'; }
    .help-icon:hover::after {
      content: attr(data-help);
      position: absolute;
      left: 30px;
      top: -10px;
      background: #2d3748;
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      width: 320px;
      max-width: 80vw;
      white-space: normal;
      word-wrap: break-word;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    
    .inline-row {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .inline-row > * { flex-shrink: 0; }
    
    #statusMsg { color: #28a745; margin-left: 10px; }
  </style>
</head>
<body>
  <h1 data-en="Settings" data-ru="Настройки">Settings</h1>

  <div class="section">
    <h2 data-en="Appearance" data-ru="Внешний вид">Appearance</h2>
    <div class="inline-row">
      <label style="margin-bottom:0;">
        <span data-en="Language" data-ru="Язык">Language</span>
      </label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>

      <label style="margin-bottom:0; margin-left: 20px;">
        <span data-en="Theme" data-ru="Тема">Theme</span>
      </label>
      <select id="themeSelect">
        <option value="light" data-en="☀️ Light" data-ru="☀️ Светлая">☀️ Light</option>
        <option value="dark" data-en="🌙 Dark" data-ru="🌙 Тёмная">🌙 Dark</option>
      </select>
    </div>
  </div>

  <div class="section">
    <h2 data-en="Sites" data-ru="Сайты">Sites</h2>

    <label>
      <span data-en="Stream Hosts" data-ru="Хосты стримов">Stream Hosts</span>
      <span class="help-icon" data-help-en="Sites where the plugin considers a stream is open. Add domains separated by commas." data-help-ru="Сайты, на которых плагин считает, что открыт стрим. Добавляй домены через запятую."></span>
    </label>
    <textarea id="streamHosts"></textarea>

    <label style="margin-top: 15px;">
      <span data-en="Archive Sites" data-ru="Сайты архивов">Archive Sites</span>
      <span class="help-icon" data-help-en="Archive sites to search. One domain per line. Top-to-bottom order = check order." data-help-ru="Сайты-архивы, по которым идёт поиск. Один домен на строку. Порядок сверху вниз = порядок проверки."></span>
    </label>
    <textarea id="archiveSites"></textarea>
  </div>

  <div class="section">
    <h2 data-en="Behavior" data-ru="Поведение">Behavior</h2>

    <div class="checkbox-group">
      <input type="checkbox" id="detectAnyStream">
      <label for="detectAnyStream" data-en="Detect any stream" data-ru="Определять любой стрим">Detect any stream</label>
      <span class="help-icon" data-help-en="Try to detect a stream even on unknown sites (by video player presence)." data-help-ru="Пытаться определить стрим даже на неизвестных сайтах (по наличию видеоплеера)."></span>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="useBongaMirror">
      <label for="useBongaMirror" data-en="Use Bonga mirror" data-ru="Использовать зеркало Bonga">Use Bonga mirror</label>
      <span class="help-icon" data-help-en="On Bonga sites, first find a working mirror via search engines." data-help-ru="На сайтах Bonga сначала искать рабочее зеркало через поисковики."></span>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="pauseOnFound">
      <label for="pauseOnFound" data-en="Pause on found" data-ru="Пауза при нахождении">Pause on found</label>
      <span class="help-icon" data-help-en="Pause search on a site as soon as the first record is found — saves time." data-help-ru="Останавливать поиск по очередному сайту, как только нашлась первая запись — экономит время."></span>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="autoScan">
      <label for="autoScan" data-en="Auto-scan" data-ru="Автосканирование">Auto-scan</label>
      <span class="help-icon" data-help-en="Automatically start search when a stream is detected." data-help-ru="Автоматически начинать поиск при обнаружении стрима."></span>
    </div>
  </div>

  <div class="section">
    <h2 data-en="Position" data-ru="Положение">Position</h2>

    <label>
      <span data-en="Widget position" data-ru="Положение виджета">Widget position</span>
      <span class="help-icon" data-help-en="Where the floating widget button appears by default." data-help-ru="Где по умолчанию появляется плавающая кнопка виджета."></span>
    </label>
    <select id="widgetPosition">
      <option value="top-left">↖️ Top Left / Сверху слева</option>
      <option value="top-right">↗️ Top Right / Сверху справа</option>
      <option value="bottom-left">↙️ Bottom Left / Снизу слева</option>
      <option value="bottom-right">↘️ Bottom Right / Снизу справа</option>
    </select>
  </div>

  <button id="saveBtn" data-en="Save" data-ru="Сохранить">Save</button>
  <span id="statusMsg"></span>

  <script src="options.js"></script>
</body>
</html>
