<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #fff; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .version { font-size: 11px; color: #888; }
    .status-box { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f4f5f7; border-radius: 6px; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ed573; }
    .status-dot.off { background: #ff4757; }
    .status-text { font-size: 13px; color: #333; font-weight: 500; }
    .links { display: flex; gap: 8px; margin-bottom: 12px; }
    .link-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px; border: 1px solid #e1e4e8; border-radius: 6px; text-decoration: none; color: #24292e; font-size: 12px; font-weight: 500; transition: all 0.2s; }
    .link-btn:hover { background: #f3f4f6; border-color: #d1d5db; }
    .link-btn svg { width: 16px; height: 16px; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; margin-bottom: 12px; }
    .toggle-label { font-size: 13px; color: #333; }
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #667eea; }
    input:checked + .slider:before { transform: translateX(16px); }
    .footer { border-top: 1px solid #eee; padding-top: 10px; text-align: center; }
    .settings-link { font-size: 12px; color: #667eea; text-decoration: none; font-weight: 500; }
    .settings-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Cam Records Searcher</div>
    <div class="version">v4.0</div>
  </div>

  <div class="status-box">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Active</div>
  </div>

  <div class="links">
    <a href="https://github.com/tech9454" target="_blank" class="link-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      GitHub
    </a>

    <a href="https://boosty.to/wcrs" target="_blank" class="link-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm4 0h-2v-6h2v6zm-2-8c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
      Boosty
    </a>
  </div>

  <div class="toggle-row">
    <span class="toggle-label" id="toggleLabel">Plugin enabled</span>
    <label class="switch">
      <input type="checkbox" id="pluginToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
	<a href="#" id="settingsLink">⚙️ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
